name: Build Quantum Algebra Calculator EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sympy pyinstaller

      - name: Build EXE
        run: |
          pyinstaller ^
            --onefile ^
            --name QuantumAlgebraCalculator ^
            calculator.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Quantum-Algebra-Calculator
          path: dist/QuantumAlgebraCalculator.exe
